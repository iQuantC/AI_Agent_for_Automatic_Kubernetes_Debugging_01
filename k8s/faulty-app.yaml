apiVersion: apps/v1
kind: Deployment
metadata:
  name: faulty-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faulty-app
  template:
    metadata:
      labels:
        app: faulty-app
    spec:
      containers:
      - name: faulty-container
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "5Mi"   # Intentionally too low
---
apiVersion: v1
kind: Service
metadata:
  name: faulty-app-service
spec:
  type: NodePort
  selector:
    app: faulty-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
